<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TutorMaster - Mensajes</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="../js/tailwind.config.js"></script>
    <style>
      body { font-family: "Lexend", sans-serif; }
      #toast.show { opacity: 1; transform: translateY(0); }
    </style>
  </head>
  <body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100">
    <div id="toast" class="fixed bottom-6 right-6 z-50 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-5 py-3 rounded-xl shadow-2xl text-sm font-semibold flex items-center gap-2 opacity-0 translate-y-5 transition-all">
      <span class="material-symbols-outlined text-primary" id="toast-icon">check_circle</span>
      <span id="toast-msg">Listo</span>
    </div>

    <div id="settings-modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/50 backdrop-blur-sm">
      <div class="bg-white dark:bg-slate-900 rounded-2xl p-8 w-full max-w-md shadow-2xl border border-slate-200 dark:border-slate-800 mx-4">
        <div class="flex items-center justify-between mb-6">
          <h3 class="text-lg font-bold">Configuracion de Cuenta</h3>
          <button onclick="closeSettings()" class="text-slate-400 hover:text-slate-700">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div class="rounded-xl border border-slate-200 dark:border-slate-700 p-4 flex items-center gap-3">
          <img id="settings-user-image" alt="Perfil" class="size-12 rounded-full object-cover" />
          <div class="min-w-0">
            <p id="settings-user-name" class="font-bold truncate">Usuario</p>
            <p id="settings-user-email" class="text-xs text-slate-500 truncate">Cuenta activa</p>
          </div>
        </div>
        <button onclick="logout()" class="w-full mt-6 py-3 bg-red-50 text-red-600 dark:bg-red-900/20 dark:text-red-300 font-bold rounded-xl hover:bg-red-100 dark:hover:bg-red-900/30 flex items-center justify-center gap-2">
          <span class="material-symbols-outlined">logout</span>
          Cerrar sesion
        </button>
      </div>
    </div>

    <div class="flex h-screen flex-col overflow-hidden">
      <header class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-6 py-3 shrink-0">
        <div class="flex items-center gap-6">
          <div class="flex items-center gap-3 text-primary cursor-pointer" onclick="window.location.href = 'tutor_home.html'">
            <span class="material-symbols-outlined text-3xl">school</span>
            <h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">TutorMaster</h2>
          </div>
          <div class="hidden md:flex items-center bg-background-light dark:bg-slate-800 rounded-lg px-3 py-1.5 w-64">
            <span class="material-symbols-outlined text-slate-500 text-sm">search</span>
            <input id="message-search" class="bg-transparent border-none focus:ring-0 text-sm w-full placeholder:text-slate-500" placeholder="Buscar conversaciones..." type="text" />
          </div>
        </div>
        <div class="flex items-center gap-4">
          <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
            <span class="material-symbols-outlined" id="dark-icon">dark_mode</span>
          </button>
          <button class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400">
            <span class="material-symbols-outlined">notifications</span>
          </button>
          <div class="h-8 w-8 rounded-full bg-primary/10 border border-primary/20 flex items-center justify-center overflow-hidden cursor-pointer" onclick="window.location.href = 'perfil_estudiante.html'">
            <img id="header-user-image" alt="Perfil Usuario" class="h-full w-full object-cover" />
          </div>
          <button onclick="openSettings()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400 hover:text-primary transition-colors" title="Configuracion">
            <span class="material-symbols-outlined">settings</span>
          </button>
        </div>
      </header>

      <div class="flex flex-1 overflow-hidden">
        <aside class="w-80 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col shrink-0">
          <div class="p-4 border-b border-slate-100 dark:border-slate-800">
            <div class="flex items-center justify-between mb-4">
              <h1 class="text-xl font-bold">Mensajes</h1>
              <button class="p-2 bg-primary text-white rounded-lg flex items-center justify-center">
                <span class="material-symbols-outlined text-sm">edit_square</span>
              </button>
            </div>
            <div class="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
              <button class="px-4 py-1.5 rounded-full bg-primary text-white text-xs font-medium whitespace-nowrap">Todos</button>
              <button class="px-4 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-medium whitespace-nowrap">Contactos</button>
              <button class="px-4 py-1.5 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-xs font-medium whitespace-nowrap">No leidos</button>
            </div>
          </div>
          <div class="flex-1 overflow-y-auto" id="chat-list">
            <p class="text-slate-500 p-4 text-center text-sm">Cargando conversaciones...</p>
          </div>
        </aside>

        <main class="flex-1 flex flex-col bg-background-light dark:bg-background-dark relative">
          <div class="flex items-center justify-between px-6 py-4 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-sm z-10">
            <div class="flex items-center gap-3">
              <div id="conversation-avatar" class="size-10 rounded-full border border-slate-200 dark:border-slate-700 bg-primary/10 flex items-center justify-center text-primary font-bold">TM</div>
              <div>
                <h2 id="conversation-title" class="text-base font-bold text-slate-900 dark:text-slate-100 leading-tight">Selecciona una conversacion</h2>
                <div class="flex items-center gap-1.5">
                  <span class="size-2 bg-slate-300 rounded-full"></span>
                  <span id="conversation-status" class="text-xs text-slate-500 font-medium">Sin conversacion activa</span>
                </div>
              </div>
            </div>
            <div class="flex items-center gap-2">
              <button class="flex items-center gap-2 px-3 py-2 bg-primary/10 hover:bg-primary/20 text-primary rounded-lg text-sm font-bold transition-colors">
                <span class="material-symbols-outlined text-lg">videocam</span>
                <span class="hidden sm:inline">Videollamada</span>
              </button>
            </div>
          </div>

          <div class="flex-1 overflow-y-auto p-6 flex flex-col gap-4" id="chat-messages">
            <p class="text-slate-500 text-sm text-center mt-10">Cargando mensajes...</p>
          </div>

          <div class="px-6 py-4 bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800">
            <div class="flex items-end gap-3 max-w-5xl mx-auto">
              <div class="flex-1 bg-background-light dark:bg-slate-800 rounded-2xl px-4 py-2 flex items-center gap-2 border border-slate-200 dark:border-slate-700 focus-within:border-primary/50 transition-all">
                <textarea id="message-input" class="bg-transparent border-none focus:ring-0 text-sm w-full py-1 resize-none placeholder:text-slate-500" placeholder="Escribe un mensaje..." rows="1"></textarea>
              </div>
              <button id="btn-send-message" class="size-10 bg-primary text-white rounded-full flex items-center justify-center shadow-lg shadow-primary/20 hover:scale-105 active:scale-95 transition-all">
                <span class="material-symbols-outlined text-xl">send</span>
              </button>
            </div>
            <div class="mt-2 text-center">
              <p class="text-[10px] text-slate-400">Presiona Enter para enviar</p>
            </div>
          </div>
        </main>
      </div>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/mensajes.js"></script>
  </body>
</html>
