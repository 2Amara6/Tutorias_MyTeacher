<!doctype html>
<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>TutorMaster - Mis Clases</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <script src="../js/tailwind.config.js"></script>
    <style>
      body { font-family: "Lexend", sans-serif; }
      #toast.show { opacity: 1; transform: translateY(0); }
    </style>
  </head>
  <body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen">
    <div id="toast" class="fixed bottom-6 right-6 z-50 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-5 py-3 rounded-xl shadow-2xl text-sm font-semibold flex items-center gap-2 opacity-0 translate-y-5 transition-all">
      <span class="material-symbols-outlined text-primary" id="toast-icon">check_circle</span>
      <span id="toast-msg">Listo</span>
    </div>

    <div id="details-modal" class="hidden fixed inset-0 z-50 items-center justify-center bg-black/50 backdrop-blur-sm px-4">
      <div class="w-full max-w-md rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 shadow-2xl p-6">
        <div class="flex items-start justify-between gap-4 mb-5">
          <div>
            <p id="details-subject" class="text-xs font-bold text-primary uppercase tracking-wider">Tutoria</p>
            <h3 id="details-title" class="text-xl font-black mt-1">Detalles de clase</h3>
          </div>
          <button onclick="closeDetails()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500">
            <span class="material-symbols-outlined">close</span>
          </button>
        </div>
        <div class="space-y-3 text-sm">
          <div class="flex justify-between gap-4">
            <span class="text-slate-500">Profesor</span>
            <span id="details-tutor" class="font-bold text-right"></span>
          </div>
          <div class="flex justify-between gap-4">
            <span class="text-slate-500">Fecha y hora</span>
            <span id="details-date" class="font-bold text-right"></span>
          </div>
          <div class="flex justify-between gap-4">
            <span class="text-slate-500">Duracion</span>
            <span id="details-duration" class="font-bold text-right"></span>
          </div>
          <div class="flex justify-between gap-4">
            <span class="text-slate-500">Estado</span>
            <span id="details-status" class="font-bold text-primary text-right"></span>
          </div>
          <div class="flex justify-between gap-4">
            <span class="text-slate-500">Total</span>
            <span id="details-price" class="font-bold text-right"></span>
          </div>
        </div>
      </div>
    </div>

    <div class="flex min-h-screen flex-col">
      <header class="flex items-center justify-between border-b border-primary/10 bg-white dark:bg-slate-900 px-6 py-3 shrink-0">
        <div class="flex items-center gap-8">
          <div class="flex items-center gap-3 cursor-pointer" onclick="window.location.href = 'tutor_home.html'">
            <div class="text-primary">
              <span class="material-symbols-outlined block text-3xl font-bold">school</span>
            </div>
            <h2 class="text-xl font-bold tracking-tight">TutorMaster</h2>
          </div>
          <nav class="hidden md:flex items-center gap-4">
            <a href="tutor_home.html" class="text-sm font-medium text-slate-500 hover:text-primary transition-colors py-1">Explorar</a>
            <a href="perfil_estudiante.html" class="text-sm font-medium text-slate-500 hover:text-primary transition-colors py-1">Perfil</a>
          </nav>
        </div>
        <div class="flex items-center gap-4">
          <button onclick="toggleDarkMode()" class="p-2 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-600 dark:text-slate-400" title="Cambiar tema">
            <span class="material-symbols-outlined" id="dark-icon">dark_mode</span>
          </button>
          <div class="text-right hidden sm:block">
            <p id="header-user-name" class="text-xs font-bold leading-tight">Usuario</p>
            <p class="text-[10px] text-slate-500 uppercase font-medium">Mis clases</p>
          </div>
          <div class="h-9 w-9 rounded-full bg-primary/20 flex items-center justify-center overflow-hidden cursor-pointer" onclick="window.location.href = 'perfil_estudiante.html'">
            <img id="header-user-image" alt="Perfil" class="h-full w-full object-cover" />
          </div>
        </div>
      </header>

      <main class="flex-1 px-5 py-8 md:px-10">
        <section class="mx-auto max-w-5xl">
          <div class="mb-6">
            <h1 class="text-2xl md:text-3xl font-black tracking-tight">Mis clases agendadas</h1>
            <p class="text-sm text-slate-500 mt-1">Tus tarjetas se actualizan con las reservas asociadas a tu cuenta.</p>
          </div>
          <div id="classes-grid" class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="rounded-2xl border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 p-6 text-slate-500">Cargando clases...</div>
          </div>
        </section>
      </main>
    </div>

    <script src="../js/utils.js"></script>
    <script src="../js/calendario_estudiante.js"></script>
  </body>
</html>
